name: Refresh crossing data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Validate secrets
        env:
          RAILRADAR_BASE: ${{ secrets.RAILRADAR_BASE }}
          RAILRADAR_KEY:  ${{ secrets.RAILRADAR_KEY }}
        run: |
          if [ -z "$RAILRADAR_BASE" ]; then
            echo "::error::RAILRADAR_BASE secret is empty or missing."
            exit 1
          fi
          if [ -z "$RAILRADAR_KEY" ]; then
            echo "::error::RAILRADAR_KEY secret is empty or missing."
            exit 1
          fi
          echo "RAILRADAR_BASE = $RAILRADAR_BASE"
          echo "RAILRADAR_KEY length = ${#RAILRADAR_KEY} chars"
          case "$RAILRADAR_BASE" in
            *\"*) echo "::error::RAILRADAR_BASE contains a literal quote — remove quotes from the secret value."; exit 1 ;;
          esac

      - name: Fetch live boards
        env:
          RAILRADAR_BASE: ${{ secrets.RAILRADAR_BASE }}
          RAILRADAR_KEY:  ${{ secrets.RAILRADAR_KEY }}
        run: |
          set -uo pipefail
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "NOW=$NOW" >> "$GITHUB_ENV"
          echo "=== Refresh at $NOW ==="

          fetch_station() {
            local code="$1"
            local outfile="$2"
            local url="${RAILRADAR_BASE}/v1/stations/${code}/live"
            echo "--- Fetching $code from: $url ---"
            curl -sS \
              -o "$outfile" \
              -w "HTTP_CODE:%{http_code} TIME:%{time_total}s\n" \
              -H "x-api-key: ${RAILRADAR_KEY}" \
              -H "Accept: application/json" \
              --connect-timeout 10 \
              --max-time 25 \
              --retry 2 \
              --retry-delay 2 \
              "$url"
            local exit_code=$?
            if [ $exit_code -ne 0 ]; then
              echo "::error::curl failed for $code — exit code $exit_code (28=timeout, 6=DNS fail, 7=connect fail, 35=SSL error, 22=HTTP error)"
              echo "{}" > "$outfile"
              return 1
            fi
            return 0
          }

          KJM_OK=1
          BLRR_OK=1
          fetch_station "KJM"  /tmp/kjm_raw.json  || KJM_OK=0
          fetch_station "BLRR" /tmp/blrr_raw.json || BLRR_OK=0

          if [ $KJM_OK -eq 0 ] && [ $BLRR_OK -eq 0 ]; then
            echo "::error::Both station fetches failed. Aborting — keeping last good cache.json untouched."
            exit 1
          fi

      - name: Parse and write cache.json
        run: |
          mkdir -p public/data
          python3 scripts/parse_cache.py "$NOW" /tmp/kjm_raw.json /tmp/blrr_raw.json public/data/cache.json

      - name: Commit cache.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/cache.json
          if git diff --cached --quiet; then
            echo "No changes — data identical to last commit."
          else
            git commit -m "chore: refresh crossing data [skip ci]"
            git push origin master
            echo "✓ Pushed updated cache.json"
          fi
